<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeZoio — Regras</title>
  <script src="/static/vendor/tailwind.js?v=dz2"></script>
  <script src="/static/vendor/lucide.min.js?v=dz2"></script>
  <link rel="stylesheet" href="/static/style.css?v=dz2">
</head>
<body class="text-[#eeeeee] font-sans antialiased selection:bg-neutral-800 selection:text-white">

<div class="min-h-screen flex flex-col md:flex-row">
  <aside id="sidebar"></aside>

  <main class="flex-1 bg-[#121212] p-6 md:p-8 overflow-y-auto space-y-8 animate-fadeIn">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 pb-4 border-b border-[#262626]">
      <div>
        <h1 class="text-xl font-bold text-white">Regras</h1>
        <p class="text-[#888888] text-xs mt-1">SE a câmera detectar algo, ENTÃO execute uma ação. Alterações valem na hora. Para o fluxo guiado, use a Automação no Dashboard.</p>
      </div>
      <div id="badge-rules" class="flex items-center gap-2 bg-[#1c1c1c] border border-[#2a2a2a] text-[#eeeeee] px-3.5 py-1.5 rounded-lg text-xs font-semibold shrink-0">
        <span id="badge-rules-dot" class="w-1.5 h-1.5 rounded-full bg-neutral-600"></span>
        <span id="badge-rules-text">Carregando...</span>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- form -->
      <div class="bg-[#1c1c1c] border border-[#262626] p-6 rounded-2xl space-y-4 h-fit">
        <h3 class="text-xs font-bold uppercase tracking-wider text-[#888888]">Nova Regra</h3>

        <div class="space-y-2">
          <label class="text-[10px] uppercase font-bold text-[#888888] tracking-wider block">Nome da regra</label>
          <input id="r-name" placeholder="Ex: Acesso liberado"
                 class="w-full bg-[#121212] border border-[#2d2d2d] rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-neutral-600 focus:border-white transition-all outline-none">
        </div>

        <div class="space-y-2">
          <label class="text-[10px] uppercase font-bold tracking-wider block"><span class="text-white">SE</span> <span class="text-[#888888]">(condição)</span></label>
          <select id="r-cond" onchange="renderCondFields()"
                  class="w-full bg-[#121212] border border-[#2d2d2d] rounded-xl px-4 py-3 text-sm text-slate-100 outline-none focus:border-white"></select>
        </div>
        <div class="space-y-2 hidden" id="f-person">
          <label class="text-[10px] uppercase font-bold text-[#888888] tracking-wider block">Pessoa</label>
          <select id="r-person" class="w-full bg-[#121212] border border-[#2d2d2d] rounded-xl px-4 py-3 text-sm text-slate-100 outline-none focus:border-white"></select>
        </div>
        <div class="space-y-2 hidden" id="f-object">
          <label class="text-[10px] uppercase font-bold text-[#888888] tracking-wider block">Objeto</label>
          <select id="r-object" class="w-full bg-[#121212] border border-[#2d2d2d] rounded-xl px-4 py-3 text-sm text-slate-100 outline-none focus:border-white"></select>
        </div>
        <div class="space-y-2 hidden" id="f-seconds">
          <label class="text-[10px] uppercase font-bold text-[#888888] tracking-wider block">Ausente por (segundos)</label>
          <input id="r-seconds" type="number" value="5" min="2"
                 class="w-full bg-[#121212] border border-[#2d2d2d] rounded-xl px-4 py-3 text-sm text-slate-100 outline-none focus:border-white">
        </div>

        <div class="space-y-2">
          <label class="text-[10px] uppercase font-bold tracking-wider block"><span class="text-white">ENTÃO</span> <span class="text-[#888888]">(ação)</span></label>
          <select id="r-action" class="w-full bg-[#121212] border border-[#2d2d2d] rounded-xl px-4 py-3 text-sm text-slate-100 outline-none focus:border-white">
            <option value="banner_green">Aviso verde no visor (liberado / ok)</option>
            <option value="banner_red">Alerta vermelho no visor</option>
          </select>
        </div>
        <div class="space-y-2">
          <label class="text-[10px] uppercase font-bold text-[#888888] tracking-wider block">Texto — use {nome} e {objeto}</label>
          <input id="r-text" placeholder="Ex: ACESSO LIBERADO — {nome}"
                 class="w-full bg-[#121212] border border-[#2d2d2d] rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-neutral-600 focus:border-white transition-all outline-none">
        </div>

        <div class="space-y-2">
          <label class="text-[10px] uppercase font-bold text-[#888888] tracking-wider block">Disparo</label>
          <select id="r-trigger" onchange="renderTriggerFields()"
                  class="w-full bg-[#121212] border border-[#2d2d2d] rounded-xl px-4 py-3 text-sm text-slate-100 outline-none focus:border-white">
            <option value="once">1x por aparição</option>
            <option value="interval">Repetir a cada X segundos</option>
          </select>
        </div>
        <div class="space-y-2 hidden" id="f-trigger-seconds">
          <label class="text-[10px] uppercase font-bold text-[#888888] tracking-wider block">Repetir a cada (segundos)</label>
          <input id="r-trigger-seconds" type="number" value="10" min="2"
                 class="w-full bg-[#121212] border border-[#2d2d2d] rounded-xl px-4 py-3 text-sm text-slate-100 outline-none focus:border-white">
        </div>

        <label class="flex items-center gap-2 text-xs text-[#888888] cursor-pointer">
          <input type="checkbox" id="r-sound" class="accent-white"> Tocar som de alerta
        </label>

        <button onclick="createRule()" class="w-full bg-white hover:bg-neutral-200 text-black py-2.5 rounded-xl font-bold transition-all text-xs">
          Criar regra
        </button>
      </div>

      <!-- lista -->
      <div class="lg:col-span-2 space-y-3" id="rules-list"></div>
    </div>
  </main>
</div>

<script src="/static/app.js?v=dz2"></script>
<script>
  renderSidebar('regras');
  let meta = { conditions: {}, people: [], objects: [] };

  async function pollModelStatus() {
    try {
      const st = await api('GET', '/api/status');
      const both = st.faces_ready && st.objects_ready;
      document.getElementById('badge-rules-dot').className =
        `w-1.5 h-1.5 rounded-full ${both ? 'bg-emerald-500 animate-pulse' : 'bg-amber-500'}`;
      document.getElementById('badge-rules-text').textContent =
        both ? 'Monitoramento Ativo' : (st.faces_ready || st.objects_ready ? 'Parcialmente Ativo' : 'Modelos carregando...');
    } catch (e) {}
    setTimeout(pollModelStatus, 3000);
  }
  pollModelStatus();

  const NEEDS = {
    person_recognized: ['person'],
    unknown_person: [],
    object_detected: ['object'],
    person_with_object: ['person', 'object'],
    person_without_object: ['person', 'object'],
    object_absent: ['object', 'seconds'],
  };

  async function loadMeta() {
    meta = await api('GET', '/api/rules/meta');
    document.getElementById('r-cond').innerHTML = Object.entries(meta.conditions)
      .map(([k, v]) => `<option value="${k}">${v}</option>`).join('');
    document.getElementById('r-person').innerHTML = '<option value="">Qualquer pessoa</option>' +
      meta.people.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    const seen = new Set();
    document.getElementById('r-object').innerHTML = meta.objects
      .filter(o => !seen.has(o.label) && seen.add(o.label))
      .sort((a, b) => a.label.localeCompare(b.label, 'pt-BR'))
      .map(o => `<option value="${o.cls}">${o.label}</option>`).join('');
    renderCondFields();
  }

  function renderCondFields() {
    const needs = NEEDS[document.getElementById('r-cond').value] || [];
    document.getElementById('f-person').classList.toggle('hidden', !needs.includes('person'));
    document.getElementById('f-object').classList.toggle('hidden', !needs.includes('object'));
    document.getElementById('f-seconds').classList.toggle('hidden', !needs.includes('seconds'));
  }

  function renderTriggerFields() {
    const interval = document.getElementById('r-trigger').value === 'interval';
    document.getElementById('f-trigger-seconds').classList.toggle('hidden', !interval);
  }

  function describe(rule) {
    const c = rule.condition;
    let desc = meta.conditions[c.type] || c.type;
    if (c.person_id) {
      const p = meta.people.find(p => p.id === c.person_id);
      desc += ` — ${p ? p.name : c.person_id}`;
    }
    if (c.object) {
      const o = meta.objects.find(o => o.cls === c.object);
      desc += ` — ${o ? o.label : c.object}`;
    }
    if (c.seconds) desc += ` — ${c.seconds}s`;
    return desc;
  }

  function describeTrigger(rule) {
    const t = rule.trigger || { mode: 'interval', seconds: 10 };
    return t.mode === 'once' ? '1x por aparição' : `a cada ${t.seconds}s`;
  }

  async function refresh() {
    const rules = await api('GET', '/api/rules');
    window._rules = rules;
    const list = document.getElementById('rules-list');
    if (!rules.length) {
      list.innerHTML = `
        <div class="bg-[#1c1c1c]/50 border border-dashed border-[#2a2a2a] p-12 rounded-2xl text-center">
          <h4 class="font-bold text-slate-300 text-sm">Nenhuma regra configurada</h4>
          <p class="text-xs text-[#888888] mt-1">Crie ao lado ou use o fluxo guiado na Automação.</p>
        </div>`;
      return;
    }
    list.innerHTML = rules.map(rule => {
      const color = rule.action.type === 'banner_green' ? 'text-emerald-400' : 'text-rose-400';
      return `
        <div class="bg-[#1c1c1c] border border-[#262626] p-5 rounded-2xl flex items-center gap-4">
          <label class="relative inline-flex items-center cursor-pointer shrink-0">
            <input type="checkbox" ${rule.enabled ? 'checked' : ''} onchange="toggleRule('${rule.id}', this.checked)" class="sr-only peer">
            <div class="w-9 h-5 bg-[#121212] border border-[#2d2d2d] rounded-full peer-checked:bg-emerald-950/60 transition-all"></div>
            <div class="absolute left-1 top-1 w-3 h-3 bg-[#555555] rounded-full transition-all peer-checked:translate-x-4 peer-checked:bg-emerald-400"></div>
          </label>
          <div class="flex-1 min-w-0">
            <h5 class="text-xs font-bold text-white truncate">${rule.name}</h5>
            <p class="text-[10px] text-[#888888] mt-0.5 truncate">
              <span class="text-white font-bold">SE</span> ${describe(rule)}
              <span class="text-white font-bold">ENTÃO</span> <span class="${color}">${rule.action.text}</span>${rule.action.sound ? ' 🔊' : ''}
              · ${describeTrigger(rule)}
            </p>
          </div>
          <button onclick="removeRule('${rule.id}')"
                  class="bg-rose-950/20 border border-rose-900/60 text-rose-400 hover:bg-rose-950/40 px-2.5 py-1.5 rounded-lg text-[10px] font-bold transition-all shrink-0">
            Excluir
          </button>
        </div>`;
    }).join('');
  }

  async function createRule() {
    const condType = document.getElementById('r-cond').value;
    const needs = NEEDS[condType] || [];
    const condition = { type: condType };
    if (needs.includes('person')) condition.person_id = document.getElementById('r-person').value || null;
    if (needs.includes('object')) condition.object = document.getElementById('r-object').value;
    if (needs.includes('seconds')) condition.seconds = Number(document.getElementById('r-seconds').value) || 5;
    try {
      await api('POST', '/api/rules', {
        name: document.getElementById('r-name').value || 'Regra',
        condition,
        action: {
          type: document.getElementById('r-action').value,
          text: document.getElementById('r-text').value,
          sound: document.getElementById('r-sound').checked,
        },
        trigger: {
          mode: document.getElementById('r-trigger').value,
          seconds: Number(document.getElementById('r-trigger-seconds').value) || 10,
        },
      });
      toast('Regra criada', 'Já está valendo na câmera.');
      document.getElementById('r-name').value = '';
      document.getElementById('r-text').value = '';
      refresh();
    } catch (e) { toast('Erro', e.message, 'error'); }
  }

  async function toggleRule(id, enabled) {
    const rule = window._rules.find(r => r.id === id);
    rule.enabled = enabled;
    await api('PUT', `/api/rules/${id}`, rule);
    toast(enabled ? 'Regra ativada' : 'Regra desativada', rule.name);
  }

  async function removeRule(id) {
    await api('DELETE', `/api/rules/${id}`);
    refresh();
  }

  loadMeta().then(refresh);
</script>
</body>
</html>
