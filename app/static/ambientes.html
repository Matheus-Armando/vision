<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeZoio — Ambientes</title>
  <script src="/static/vendor/tailwind.js?v=dz2"></script>
  <script src="/static/vendor/lucide.min.js?v=dz2"></script>
  <link rel="stylesheet" href="/static/style.css?v=dz2">
</head>
<body class="text-[#eeeeee] font-sans antialiased selection:bg-neutral-800 selection:text-white">

  <div class="min-h-screen flex flex-col justify-between py-12 px-6 animate-fadeIn">
    <header class="max-w-7xl w-full mx-auto flex justify-between items-center">
      <img src="/static/brand/logo_svg_dezoio.svg" alt="DeZoio" class="h-10 w-auto object-contain">
      <span class="bg-[#1c1c1c] border border-[#2d2d2d] text-[10px] font-semibold text-[#888888] px-3 py-1.5 rounded-full">
        MVP — Ideathon 2026
      </span>
    </header>

    <main class="max-w-4xl w-full mx-auto text-center space-y-8 flex flex-col items-center">
      <div class="w-56 h-56 md:w-72 md:h-72 flex items-center justify-center select-none">
        <img src="/static/brand/art.svg" alt="" class="w-full h-[80%] object-contain rounded-2xl">
      </div>

      <h1 class="text-2xl md:text-3xl font-normal tracking-tight text-white">
        Qual ambiente deseja monitorar?
      </h1>

      <div id="workspaces-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5 pt-4 w-full max-w-4xl">
        <!-- preenchido pelo JS -->
      </div>
    </main>

    <footer class="text-center text-xs text-[#555555] max-w-md mx-auto font-light mt-12">
      DeZoio • Transformando câmeras e ambientes em automação e monitoramento inteligente.
    </footer>
  </div>

  <!-- modal: novo ambiente -->
  <div id="modal-new-workspace" class="fixed inset-0 bg-[#0c0c0c]/90 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden animate-fadeIn">
    <div class="bg-[#1c1c1c] border border-[#2d2d2d] w-full max-w-md p-6 rounded-2xl shadow-2xl space-y-6">
      <div class="space-y-1">
        <h3 class="text-base font-bold text-white">Criar Novo Ambiente</h3>
        <p class="text-xs text-[#888888]">Separe câmeras e automações por setor. Neste MVP, ambientes novos ficam em standby até vincular uma câmera.</p>
      </div>
      <form onsubmit="createWorkspace(event)" class="space-y-4">
        <div class="space-y-2">
          <label class="text-[9px] font-bold uppercase text-[#888888] tracking-wider block">Nome do Ambiente</label>
          <input type="text" id="input-ws-name" required placeholder="Ex: Portão principal, Recepção, Garagem"
                 class="w-full bg-[#121212] border border-[#2d2d2d] rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-neutral-700 focus:border-white outline-none transition-all">
        </div>
        <div class="flex items-center justify-end space-x-3 pt-2">
          <button type="button" onclick="document.getElementById('modal-new-workspace').classList.add('hidden')"
                  class="text-xs font-semibold text-[#888888] hover:text-white transition-all">Cancelar</button>
          <button type="submit" class="bg-white hover:bg-neutral-200 text-black text-xs font-semibold px-4 py-2.5 rounded-xl transition-all">Criar Ambiente</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/app.js?v=dz2"></script>
  <script>
    let cameraOnline = false;

    function render() {
      const grid = document.getElementById('workspaces-grid');
      let html = '';
      for (const ws of dzWorkspaces()) {
        const isPrincipal = ws.id === 'principal';
        const on = isPrincipal && cameraOnline;
        html += `
          <div onclick="enter('${ws.id}')" class="bg-[#1c1c1c] hover:bg-[#222222] border border-[#2a2a2a] hover:border-[#3a3a3a] rounded-2xl p-5 flex flex-col justify-between text-left min-h-[120px] cursor-pointer transition-all group shadow-md">
            <h3 class="text-sm font-semibold text-white">${ws.name}</h3>
            <div class="flex justify-between items-center mt-6">
              <div class="flex items-center space-x-2">
                <span class="w-1.5 h-1.5 rounded-full ${on ? 'bg-emerald-500 animate-pulse' : 'bg-neutral-600'}"></span>
                <span class="text-[10px] text-[#888888] font-medium">${isPrincipal ? (on ? 'IA Ativa' : 'Conectando...') : 'Standby'}</span>
              </div>
              <span class="text-[10px] text-[#888888] group-hover:text-white transition-all flex items-center">
                Acessar <i data-lucide="chevron-right" class="w-3 h-3 ml-0.5"></i>
              </span>
            </div>
          </div>`;
      }
      html += `
        <div onclick="document.getElementById('modal-new-workspace').classList.remove('hidden')"
             class="bg-[#1c1c1c]/40 hover:bg-[#1c1c1c]/90 border border-dashed border-[#2d2d2d] hover:border-neutral-500 rounded-2xl p-8 flex flex-col items-center justify-center min-h-[120px] cursor-pointer transition-all group">
          <div class="bg-[#1c1c1c] border border-[#2d2d2d] w-12 h-12 rounded-full flex items-center justify-center text-slate-400 group-hover:text-white transition-all">
            <i data-lucide="plus" class="w-5 h-5"></i>
          </div>
        </div>`;
      grid.innerHTML = html;
      initLucide();
    }

    function enter(id) {
      localStorage.setItem('dz_active_ws', id);
      window.location.href = '/painel';
    }

    function createWorkspace(e) {
      e.preventDefault();
      const name = document.getElementById('input-ws-name').value.trim();
      if (!name) return;
      const extra = JSON.parse(localStorage.getItem('dz_workspaces') || '[]');
      const id = name.toLowerCase().normalize('NFD').replace(/[^\w\s-]/g, '').replace(/\s+/g, '-');
      if (id === 'principal' || extra.some(w => w.id === id)) {
        return toast('Ambiente já existe', 'Escolha outro nome.', 'error');
      }
      extra.push({ id, name });
      localStorage.setItem('dz_workspaces', JSON.stringify(extra));
      document.getElementById('modal-new-workspace').classList.add('hidden');
      document.getElementById('input-ws-name').value = '';
      toast('Novo Ambiente', `"${name}" criado — em standby até vincular uma câmera.`);
      render();
    }

    async function pollCamera() {
      try {
        const st = await api('GET', '/api/status');
        cameraOnline = st.camera === 'ao vivo';
      } catch (e) { cameraOnline = false; }
      render();
      setTimeout(pollCamera, 4000);
    }

    render();
    pollCamera();
  </script>
</body>
</html>
